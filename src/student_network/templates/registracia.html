<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrácia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page page-form">
    <div class="card">
        <h1>Registrácia</h1>
        <form method="post">
            <div class="field">
                <label for="meno">Meno</label>
                <input id="meno" name="meno" type="text" value="{{ values.meno if values else '' }}" required>
                <p class="form-error field-error" aria-live="polite">{{ errors.meno if errors else '' }}</p>
            </div>
            <div class="field">
                <label for="priezvisko">Priezvisko</label>
                <input id="priezvisko" name="priezvisko" type="text" value="{{ values.priezvisko if values else '' }}" required>
                <p class="form-error field-error" aria-live="polite">{{ errors.priezvisko if errors else '' }}</p>
            </div>
            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="text" value="{{ values.email if values else '' }}" required>
                <p class="form-error field-error" aria-live="polite">{{ errors.email if errors else '' }}</p>
            </div>
            <div class="field">
                <label for="heslo">Heslo</label>
                <div class="password-row">
                    <input id="heslo" name="heslo" type="password" required>
                    <button class="toggle-password" type="button" data-target="heslo">Zobraziť heslo</button>
                </div>
                <p class="form-error field-error" aria-live="polite">{{ errors.heslo if errors else '' }}</p>
            </div>
            <div class="field">
                <label for="znova_heslo">Znova heslo</label>
                <div class="password-row">
                    <input id="znova_heslo" name="znova_heslo" type="password" required>
                    <button class="toggle-password" type="button" data-target="znova_heslo">Zobraziť heslo</button>
                </div>
                <p class="form-error field-error" aria-live="polite">{{ errors.znova_heslo if errors else '' }}</p>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Registrovať sa</button>
                <a class="btn-link" href="/">Späť</a>
            </div>
        </form>
    </div>

    <script>
        const toggleButtons = document.querySelectorAll('.toggle-password');

        toggleButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);

                if (input.type === 'password') {
                    input.type = 'text';
                    button.textContent = 'Skryť heslo';
                    return;
                }

                input.type = 'password';
                button.textContent = 'Zobraziť heslo';
            });
        });
    </script>
</body>
</html>
