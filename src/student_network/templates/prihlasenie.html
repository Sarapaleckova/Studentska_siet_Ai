<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prihlásenie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page page-form">
    <div class="card">
        <h1>Prihlásenie</h1>
        <form>
            <div class="field">
                <label for="meno">Meno</label>
                <input id="meno" name="meno" type="text">
            </div>
            <div class="field">
                <label for="heslo">Heslo</label>
                <div class="password-row">
                    <input id="heslo" name="heslo" type="password">
                    <button class="toggle-password" type="button" data-target="heslo">Zobraziť heslo</button>
                </div>
            </div>
            <div class="actions">
                <a class="btn-link" href="/aplikacia/domov">Ďalej</a>
                <a class="btn-link" href="/">Späť</a>
            </div>
            <button class="forgot" type="button">Zabudnuté heslo</button>
        </form>
    </div>

    <script>
        const toggleButtons = document.querySelectorAll('.toggle-password');

        toggleButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);

                if (input.type === 'password') {
                    input.type = 'text';
                    button.textContent = 'Skryť heslo';
                    return;
                }

                input.type = 'password';
                button.textContent = 'Zobraziť heslo';
            });
        });
    </script>
</body>
</html>
